version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/ecommerce?useSSL=false&serverTimezone=UTC
      DB_USER: ecommerce
      DB_PASS: ecommerce
    volumes:
      - ./data:/data    # optional host folder for sqlite or other persistent data

volumes:
  db_data:
